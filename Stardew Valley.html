<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stardew Valley</title>
    <base
      href="https://cdn.jsdelivr.net/gh/cirsius/stardew-wasm@master/"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }
      #loading {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font: 1.5rem/1 sans-serif;
        z-index: 1;
        flex-direction: column;
        gap: 1rem;
      }
      #loading.hidden {
        display: none;
      }
      canvas {
        width: 100%;
        height: 100%;
        display: block;
      }
      #touch-controls {
        position: fixed;
        inset: auto 0 0 0;
        display: flex;
        justify-content: space-between;
        align-items: end;
        gap: 1rem;
        padding: 1rem;
        padding-bottom: calc(1rem + env(safe-area-inset-bottom, 0px));
        padding-left: calc(1rem + env(safe-area-inset-left, 0px));
        padding-right: calc(1rem + env(safe-area-inset-right, 0px));
        z-index: 2;
        pointer-events: none;
      }
      .controls-cluster {
        display: grid;
        gap: 0.5rem;
        pointer-events: auto;
      }
      .dpad {
        grid-template-columns: repeat(3, 4.25rem);
        grid-template-rows: repeat(3, 4.25rem);
        align-items: center;
        justify-items: center;
      }
      .actions {
        grid-template-columns: repeat(2, minmax(4.5rem, 5.25rem));
      }
      .touch-btn {
        appearance: none;
        border: 1px solid rgba(255, 255, 255, 0.25);
        border-radius: 999px;
        background: rgba(25, 25, 25, 0.55);
        color: #fff;
        font: 600 1rem/1 sans-serif;
        width: 4.25rem;
        height: 4.25rem;
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        touch-action: none;
        user-select: none;
      }
      .touch-btn.wide {
        width: 5.25rem;
        height: 5.25rem;
      }
      .touch-btn:active,
      .touch-btn.is-active {
        background: rgba(255, 255, 255, 0.22);
      }
      .dpad-up {
        grid-column: 2;
        grid-row: 1;
      }
      .dpad-left {
        grid-column: 1;
        grid-row: 2;
      }
      .dpad-right {
        grid-column: 3;
        grid-row: 2;
      }
      .dpad-down {
        grid-column: 2;
        grid-row: 3;
      }
      @media (max-width: 900px) {
        #touch-controls {
          padding: 0.75rem;
          gap: 0.75rem;
          padding-bottom: calc(0.75rem + env(safe-area-inset-bottom, 0px));
          padding-left: calc(0.75rem + env(safe-area-inset-left, 0px));
          padding-right: calc(0.75rem + env(safe-area-inset-right, 0px));
        }
        .dpad {
          grid-template-columns: repeat(3, 3.5rem);
          grid-template-rows: repeat(3, 3.5rem);
        }
        .actions {
          grid-template-columns: repeat(2, minmax(3.75rem, 4.5rem));
        }
        .touch-btn {
          width: 3.5rem;
          height: 3.5rem;
          font-size: 0.9rem;
        }
        .touch-btn.wide {
          width: 4.5rem;
          height: 4.5rem;
        }
      }
      @media (max-width: 900px) and (orientation: portrait) {
        #touch-controls {
          left: 0;
          right: 0;
          justify-content: space-between;
          align-items: end;
          gap: 0.5rem;
          padding-top: 0;
        }
        .dpad {
          grid-template-columns: repeat(3, 3rem);
          grid-template-rows: repeat(3, 3rem);
        }
        .actions {
          grid-template-columns: repeat(2, minmax(3.15rem, 3.85rem));
          align-self: end;
        }
        .touch-btn {
          width: 3rem;
          height: 3rem;
          font-size: 0.82rem;
        }
        .touch-btn.wide {
          width: 3.85rem;
          height: 3.85rem;
        }
      }
      @media (max-width: 480px) and (orientation: portrait) {
        #touch-controls {
          gap: 0.35rem;
          padding-bottom: calc(0.5rem + env(safe-area-inset-bottom, 0px));
          padding-left: calc(0.5rem + env(safe-area-inset-left, 0px));
          padding-right: calc(0.5rem + env(safe-area-inset-right, 0px));
        }
        .dpad {
          grid-template-columns: repeat(3, 2.6rem);
          grid-template-rows: repeat(3, 2.6rem);
        }
        .actions {
          grid-template-columns: repeat(2, minmax(2.8rem, 3.35rem));
          gap: 0.35rem;
        }
        .touch-btn {
          width: 2.6rem;
          height: 2.6rem;
          font-size: 0.74rem;
        }
        .touch-btn.wide {
          width: 3.35rem;
          height: 3.35rem;
        }
      }
    </style>
  </head>
  <body>
    <div id="loading">
      <div>Loading game...</div>
    </div>
    <script>
      const originalFetch = window.fetch;
      window.fetch = function (resource, options = {}) {
        options.credentials = "omit";
        return originalFetch(resource, options);
      };

      (function() {
        var originalGetDirectory = navigator.storage && navigator.storage.getDirectory
          ? navigator.storage.getDirectory.bind(navigator.storage) : null;

        function openIDB() {
          return new Promise(function(resolve, reject) {
            var req = indexedDB.open("stardew-opfs-polyfill", 1);
            req.onupgradeneeded = function() { req.result.createObjectStore("files"); };
            req.onsuccess = function() { resolve(req.result); };
            req.onerror = function() { reject(req.error); };
          });
        }

        var idbPromise = null;
        function getIDB() {
          if (!idbPromise) idbPromise = openIDB();
          return idbPromise;
        }

        function idbGet(db, key) {
          return new Promise(function(resolve, reject) {
            var tx = db.transaction("files", "readonly");
            var req = tx.objectStore("files").get(key);
            req.onsuccess = function() { resolve(req.result); };
            req.onerror = function() { reject(req.error); };
          });
        }

        function idbPut(db, key, val) {
          return new Promise(function(resolve, reject) {
            var tx = db.transaction("files", "readwrite");
            var req = tx.objectStore("files").put(val, key);
            req.onsuccess = function() { resolve(); };
            req.onerror = function() { reject(req.error); };
          });
        }

        function makeWritable(db, name) {
          var chunks = [];
          return {
            write: function(data) { chunks.push(data instanceof Uint8Array ? data.slice() : new Uint8Array(data)); return Promise.resolve(); },
            close: function() {
              var total = 0;
              chunks.forEach(function(c) { total += c.length; });
              var merged = new Uint8Array(total);
              var off = 0;
              chunks.forEach(function(c) { merged.set(c, off); off += c.length; });
              return idbPut(db, name, merged);
            }
          };
        }

        function makeFakeRoot(db) {
          return {
            getFileHandle: function(name, opts) {
              if (opts && opts.create) {
                return Promise.resolve({
                  getFile: function() {
                    return idbGet(db, name).then(function(data) {
                      return new Blob([data || new Uint8Array(0)]);
                    });
                  },
                  createWritable: function() { return Promise.resolve(makeWritable(db, name)); }
                });
              }
              return idbGet(db, name).then(function(data) {
                if (data === undefined) throw new DOMException("Not found", "NotFoundError");
                return {
                  getFile: function() { return Promise.resolve(new Blob([data])); },
                  createWritable: function() { return Promise.resolve(makeWritable(db, name)); }
                };
              });
            }
          };
        }

        if (navigator.storage) {
          navigator.storage.getDirectory = function() {
            if (originalGetDirectory) {
              return originalGetDirectory().catch(function() {
                return getIDB().then(makeFakeRoot);
              });
            }
            return getIDB().then(makeFakeRoot);
          };
        }
      })();
    </script>

    <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>
    <div id="touch-controls" aria-label="On-screen controls">
      <div class="controls-cluster dpad">
        <button class="touch-btn dpad-up" data-key="w" data-code="KeyW" aria-label="Move up">W</button>
        <button class="touch-btn dpad-left" data-key="a" data-code="KeyA" aria-label="Move left">A</button>
        <button class="touch-btn dpad-right" data-key="d" data-code="KeyD" aria-label="Move right">D</button>
        <button class="touch-btn dpad-down" data-key="s" data-code="KeyS" aria-label="Move down">S</button>
      </div>
      <div class="controls-cluster actions">
        <button class="touch-btn wide" data-key="x" data-code="KeyX" aria-label="Use tool">X</button>
        <button class="touch-btn wide" data-key="c" data-code="KeyC" aria-label="Use action">C</button>
        <button class="touch-btn wide" data-key="e" data-code="KeyE" aria-label="Open inventory">E</button>
        <button class="touch-btn wide" data-key="Escape" data-code="Escape" aria-label="Open menu">Esc</button>
      </div>
    </div>
    <script>
(async () => {
const BASE = document.querySelector("base").href;
const loading = document.getElementById("loading");
const canvas = document.getElementById("canvas");
const touchControls = document.getElementById("touch-controls");
canvas.tabIndex = 0;

const storage = await navigator.storage.getDirectory();

async function storageRead(name) {
	return new Uint8Array(await (await (await storage.getFileHandle(name)).getFile()).arrayBuffer());
}
async function storageWrite(name, data) {
	const w = await (await storage.getFileHandle(name, { create: true })).createWritable();
	await w.write(data); await w.close();
}

async function downloadTar(base, label) {
	loading.textContent = `Downloading ${label}...`;
	const count = parseInt(await (await fetch(base + ".count")).text());
	const chunks = [];
	let total = 0;
	for (let i = 0; i < count; i++) {
		const res = await fetch(`${base}${String(i).padStart(2, "0")}`);
		if (!res.ok) throw new Error(`Failed: ${res.status}`);
		const reader = res.body.getReader();
		for (;;) {
			const { done, value } = await reader.read();
			if (done) break;
			chunks.push(value);
			total += value.length;
			loading.textContent = `Downloading ${label}... ${(total / 1048576) | 0} MB`;
		}
	}
	const tar = new Uint8Array(total);
	let off = 0;
	for (const c of chunks) { tar.set(c, off); off += c.length; }
	return tar;
}

async function getTar(base, label, key) {
	try {
		loading.textContent = `Loading cached ${label}...`;
		return await storageRead(key);
	} catch {
		const tar = await downloadTar(base, label);
		try { loading.textContent = `Caching ${label}...`; await storageWrite(key, tar); } catch {}
		return tar;
	}
}

const contentP = getTar("Content.tar", "game content", "Content.tar");
const audioP = Promise.resolve(null);
const runtimeP = (async () => {
	const { dotnet } = await import(BASE + "_framework/dotnet.js");
	return dotnet
		.withModuleConfig({ canvas })
		.withEnvironmentVariable("MONO_SLEEP_ABORT_LIMIT", "99999")
		.withRuntimeOptions([
			`--jiterpreter-minimum-trace-hit-count=${500}`,
			`--jiterpreter-trace-monitoring-period=${100}`,
			`--jiterpreter-trace-monitoring-max-average-penalty=${150}`,
			`--jiterpreter-wasm-bytes-limit=${64 * 1024 * 1024}`,
			`--jiterpreter-table-size=${32 * 1024}`,
		])
		.withResourceLoader((type, _name, defaultUri, _integrity, behavior) => {
			if (type === "dotnetwasm" && behavior === "dotnetwasm") {
				return (async () => {
					const count = parseInt(await (await fetch(defaultUri + ".count")).text());
					let idx = 0;
					const fetchNext = async () => {
						if (idx >= count) return null;
						const res = await fetch(defaultUri + idx);
						idx++;
						return res.ok ? res.body.getReader() : null;
					};
					let current = await fetchNext();
					if (!current) throw new Error("failed to fetch first wasm chunk");
					return new Response(new ReadableStream({
						async pull(controller) {
							const { value, done } = await current.read();
							if (done || !value) {
								current = await fetchNext();
								if (current) await this.pull(controller);
								else controller.close();
							} else controller.enqueue(value);
						},
					}), { headers: { "Content-Type": "application/wasm" } });
				})();
			}
		})
		.create();
})();

const [contentTar, audioTar, runtime] = await Promise.all([contentP, audioP, runtimeP]);
const exports = await runtime.getAssemblyExports(runtime.getConfig().mainAssemblyName);

function extractTar(tar, prefix) {
	let pos = 0, count = 0;
	const dec = new TextDecoder();
	const str = (buf, o, n) => { let e = o; while (e < o + n && buf[e]) e++; return dec.decode(buf.subarray(o, e)); };
	const oct = (buf, o, n) => { const s = str(buf, o, n).trim(); return s ? parseInt(s, 8) : 0; };
	while (pos + 512 <= tar.length) {
		const h = tar.subarray(pos, pos + 512);
		if (!h[0]) break;
		const name = str(h, 0, 100), size = oct(h, 124, 12), type = h[156];
		const pref = str(h, 345, 155);
		const full = pref ? pref + "/" + name : name;
		pos += 512;
		if (type === 53 || name.endsWith("/")) {
			exports.WasmBootstrap.CreateContentDirectory(prefix + full);
		} else if (type === 48 || type === 0) {
			exports.WasmBootstrap.WriteContentFile(prefix + full, tar.subarray(pos, pos + size));
			count++;
		}
		pos += Math.ceil(size / 512) * 512;
	}
	return count;
}

await runtime.runMain();
await exports.WasmBootstrap.PreInit();

try {
	const savesTar = await storageRead("Saves.tar");
	exports.WasmBootstrap.CreateContentDirectory("/libsdl/saves/Saves");
	extractTar(savesTar, "/libsdl/saves/Saves/");
} catch {}

loading.textContent = "Loading game files...";
extractTar(contentTar, "/libsdl/");
if (audioTar) { loading.textContent = "Loading music..."; extractTar(audioTar, "/libsdl/"); }

loading.classList.add("hidden");

const dpr = window.devicePixelRatio || 1;
const w = Math.round(canvas.clientWidth * dpr) || 1280;
const h = Math.round(canvas.clientHeight * dpr) || 720;
await exports.WasmBootstrap.Init(w, h);

new ResizeObserver(() => {
	const dpr = window.devicePixelRatio || 1;
	const nw = Math.round(canvas.clientWidth * dpr);
	const nh = Math.round(canvas.clientHeight * dpr);
	if (nw > 0 && nh > 0) try { exports.WasmBootstrap.Resize(nw, nh); } catch {}
}).observe(canvas);

try { navigator.keyboard?.lock(); } catch {}
document.addEventListener("keydown", (e) => {
	if (["Space","ArrowUp","ArrowDown","ArrowLeft","ArrowRight","Tab"].includes(e.code))
		e.preventDefault();
});

const activePointers = new Map();
const pressedKeys = new Map();

function dispatchVirtualKey(type, key, code) {
	const legacyKeyCodes = {
		KeyA: 65,
		KeyC: 67,
		KeyD: 68,
		KeyE: 69,
		KeyS: 83,
		KeyW: 87,
		KeyX: 88,
		Escape: 27,
	};
	const legacyCode = legacyKeyCodes[code] || 0;
	const targets = [canvas, document, window];
	for (const target of targets) {
		const event = new Event(type, { bubbles: true, cancelable: true });
		Object.defineProperties(event, {
			key: { get: () => key },
			code: { get: () => code },
			type: { get: () => type },
			keyCode: { get: () => legacyCode },
			which: { get: () => legacyCode },
			charCode: { get: () => legacyCode },
			location: { get: () => 0 },
			repeat: { get: () => false },
			altKey: { get: () => false },
			ctrlKey: { get: () => false },
			metaKey: { get: () => false },
			shiftKey: { get: () => false },
		});
		target.dispatchEvent(event);
	}
}

function pressVirtualKey(key, code) {
	if (pressedKeys.has(code)) return;
	pressedKeys.set(code, true);
	dispatchVirtualKey("keydown", key, code);
	dispatchVirtualKey("keypress", key, code);
}

function releaseVirtualKey(key, code) {
	if (!pressedKeys.has(code)) return;
	pressedKeys.delete(code);
	dispatchVirtualKey("keyup", key, code);
}

for (const button of touchControls.querySelectorAll(".touch-btn")) {
	const { key, code } = button.dataset;
	const onPress = (event) => {
		event.preventDefault();
		canvas.focus({ preventScroll: true });
		button.setPointerCapture?.(event.pointerId);
		button.classList.add("is-active");
		if (event.pointerId != null) activePointers.set(event.pointerId, { key, code });
		pressVirtualKey(key, code);
	};
	const onRelease = (event) => {
		event.preventDefault();
		button.classList.remove("is-active");
		if (event.pointerId != null) activePointers.delete(event.pointerId);
		releaseVirtualKey(key, code);
	};
	button.addEventListener("pointerdown", onPress);
	button.addEventListener("pointerup", onRelease);
	button.addEventListener("pointercancel", onRelease);
	button.addEventListener("lostpointercapture", onRelease);
}

window.addEventListener("blur", () => {
	for (const [code] of pressedKeys) {
		const button = touchControls.querySelector(`.touch-btn[data-code="${code}"]`);
		if (button) button.classList.remove("is-active");
	}
	for (const [pointerId, { key, code }] of activePointers) {
		activePointers.delete(pointerId);
		releaseVirtualKey(key, code);
	}
});

await exports.WasmBootstrap.MainLoop();
})();
    </script>
  </body>
</html>
